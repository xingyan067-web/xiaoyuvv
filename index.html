<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 核心：viewport-fit=cover 确保网页延伸到刘海和底部横条区域 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>iOS Desk</title>

    <!-- ================= PWA & iOS 桌面安装专属配置 ================= -->
    <!-- 允许网页以独立APP模式运行（隐藏 Safari 浏览器的地址栏和底部栏） -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- 状态栏透明沉浸式：让网页背景延伸到顶部状态栏（时间、电量）下方，告别顶部黑边 -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- 安装到桌面后的 APP 名称 -->
    <meta name="apple-mobile-web-app-title" content="我的桌面">
    <!-- 安装到桌面时的 APP 图标 (请确保同目录下有一张 icon.png) -->
    <link rel="apple-touch-icon" href="https://i.postimg.cc/yYrDHvG5/mmexport1766982633245.jpg">
    <!-- 引入 PWA manifest -->
    <link rel="manifest" href="manifest.json">
    <!-- ========================================================= -->

    <style>
        /* ================= 基础重置 ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            /* 使用 dvh 完美解决移动端浏览器地址栏收缩导致的留白问题 */
            height: 100dvh; 
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            /* 韩系 Ins 风高级感背景 */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }

        /* ================= 主屏幕容器 ================= */
        .ios-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            /* 核心：读取苹果官方安全区域，防止内容被刘海/灵动岛/底部横条遮挡 */
            padding-top: env(safe-area-inset-top, 47px);
            padding-bottom: env(safe-area-inset-bottom, 34px);
            padding-left: env(safe-area-inset-left, 0px);
            padding-right: env(safe-area-inset-right, 0px);
            position: relative;
        }

        /* 模拟顶部状态栏 (增加逼真度，独立APP模式下会和系统状态栏重合，所以这里可以隐藏或保留作为装饰) */
        .status-bar {
            height: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            letter-spacing: 0.5px;
            /* 在真实的独立APP模式下，系统会显示真实时间，所以我们可以把模拟的隐藏掉 */
            opacity: 0; 
        }

        /* ================= 桌面 4x7 网格 ================= */
        .desktop {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: 2vh 4vw; 
            padding: 20px 6vw;
            align-content: start;
        }

        /* ================= 底部 Dock 栏 ================= */
        .dock-wrapper {
            padding: 10px 4vw 15px 4vw;
        }

        .dock {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            height: 90px;
            border-radius: 35px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        /* ================= APP 图标通用样式 ================= */
        .app-icon {
            width: 100%;
            aspect-ratio: 1 / 1; 
            border-radius: 22.5%; 
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 
                0 4px 15px rgba(0, 0, 0, 0.04),
                inset 0 0 0 1px rgba(255, 255, 255, 0.8);
        }

        .desktop .app-icon {
            max-width: 65px;
            max-height: 65px;
            margin: 0 auto;
        }

        .dock .app-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.85);
        }

        @media (min-width: 768px) {
            .ios-screen {
                max-width: 430px;
                margin: 0 auto;
                box-shadow: 0 0 50px rgba(0,0,0,0.1);
                background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            }
            body { background: #dcdcdc; }
        }
    </style>
</head>
<body>

    <div class="ios-screen">
        <div class="status-bar"></div>

        <!-- 桌面区域 (4x7 网格) -->
        <div class="desktop">
            <div class="app-icon"></div>
            <div class="app-icon"></div>
            <div class="app-icon"></div>
            <div class="app-icon"></div>
        </div>

        <!-- 底部 Dock 栏 -->
        <div class="dock-wrapper">
            <div class="dock">
                <div class="app-icon"></div>
                <div class="app-icon"></div>
                <div class="app-icon"></div>
            </div>
        </div>
    </div>

</body>
</html>
