<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 核心：viewport-fit=cover 确保网页延伸到刘海和底部横条区域，避免黑边 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iOS Aesthetic Home Screen</title>
    <style>
        /* ================= 基础重置 ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            /* 使用 dvh (Dynamic Viewport Height) 完美解决移动端浏览器地址栏收缩导致的留白问题 */
            height: 100dvh; 
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            /* 韩系 Ins 风高级感背景：低饱和度柔和渐变 */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            /* 如果想换成彩色ins风，可以尝试：background: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%); */
        }

        /* ================= 主屏幕容器 ================= */
        .ios-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            /* 核心：读取苹果官方安全区域，防止内容被刘海/灵动岛/底部横条遮挡 */
            padding-top: env(safe-area-inset-top, 47px);
            padding-bottom: env(safe-area-inset-bottom, 34px);
            padding-left: env(safe-area-inset-left, 0px);
            padding-right: env(safe-area-inset-right, 0px);
            position: relative;
        }

        /* 模拟顶部状态栏 (增加逼真度) */
        .status-bar {
            height: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            letter-spacing: 0.5px;
        }

        /* ================= 桌面 4x7 网格 ================= */
        .desktop {
            flex: 1;
            display: grid;
            /* 强制 4 列 */
            grid-template-columns: repeat(4, 1fr);
            /* 强制 7 行 */
            grid-template-rows: repeat(7, 1fr);
            /* 动态间距，适配不同屏幕 */
            gap: 2vh 4vw; 
            padding: 20px 6vw;
            align-content: start;
        }

        /* ================= 底部 Dock 栏 ================= */
        .dock-wrapper {
            padding: 10px 4vw 15px 4vw;
        }

        .dock {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            height: 90px;
            border-radius: 35px;
            /* 高级感毛玻璃效果 */
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        /* ================= APP 图标通用样式 ================= */
        .app-icon {
            width: 100%;
            /* 保持完美正方形 */
            aspect-ratio: 1 / 1; 
            /* iOS 标准圆角曲率近似值 */
            border-radius: 22.5%; 
            /* 空白图标的高级感样式：半透明白 + 极简阴影 */
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 
                0 4px 15px rgba(0, 0, 0, 0.04),
                inset 0 0 0 1px rgba(255, 255, 255, 0.8);
            transition: transform 0.2s ease;
        }

        /* 限制桌面图标的最大尺寸，防止在 PC 宽屏上过大 */
        .desktop .app-icon {
            max-width: 65px;
            max-height: 65px;
            margin: 0 auto;
        }

        /* Dock 栏图标固定尺寸 */
        .dock .app-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.85);
        }

        /* 响应式微调：针对 PC 等超宽屏幕，限制整体宽度以保持手机比例的视觉美感 */
        @media (min-width: 768px) {
            .ios-screen {
                max-width: 430px; /* iPhone 15 Pro Max 宽度 */
                margin: 0 auto;
                box-shadow: 0 0 50px rgba(0,0,0,0.1);
                background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            }
            body {
                background: #dcdcdc; /* PC端背景色 */
            }
        }
    </style>
</head>
<body>

    <div class="ios-screen">
        <!-- 顶部状态栏 -->
        <div class="status-bar">
            <div class="time">09:41</div>
            <div class="icons">
                <!-- 简单的状态栏图标占位 -->
                <span>5G</span>
                <span style="margin-left: 5px;">🔋</span>
            </div>
        </div>

        <!-- 桌面区域 (4x7 网格) -->
        <div class="desktop">
            <!-- 桌面 4 个 APP 图标 -->
            <div class="app-icon"></div>
            <div class="app-icon"></div>
            <div class="app-icon"></div>
            <div class="app-icon"></div>
            
            <!-- 剩余的网格留空，CSS Grid 会自动处理位置 -->
        </div>

        <!-- 底部 Dock 栏 -->
        <div class="dock-wrapper">
            <div class="dock">
                <!-- Dock 栏 3 个 APP 图标 -->
                <div class="app-icon"></div>
                <div class="app-icon"></div>
                <div class="app-icon"></div>
            </div>
        </div>
    </div>

</body>
</html>
